<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoNet-3D</title>
    <link rel="stylesheet" href="main-style.css">
</head>
<body>
    
    <div id="canvas-container"></div><!--Here live the project ;o-->>


    <div id="ui-panel">
        <h3>System Controls</h3>
        <hr>
        <div class="control-group">
            <label>
                <input type="checkbox" id="toggle-stars" checked>
                Toggle Stars
            </label>

            <label>
                <input type="checkbox" id="toggle-lock">
                Lock Camera
            </label>

            <label>
                <input type="checkbox" id="toggle-compass" checked> Toggle 3D Compas
            </label>

            <label>
                <input type="checkbox" id="toggle-speed"> Enable Real-Time Speed
            </label>

            <div class="planet-selector" style="display: flex; align-items: center; justify-content: space-between; margin: 15px 0;">
                <button id="prev-planet">&lt;</button>
            <div id="current-planet-name" style="font-weight: bold; color: #00ffcc;">Terra</div>
                 <button id="next-planet">&gt;</button>
            </div>

            <div id="planet-type" style="font-size: 12px; color: #aaa; text-align: center; margin-bottom: 15px;">Tipo: Planeta</div>

            <!------------------------------------>

            <div class="coodinates-display">
                <span class="display" id="cord-x">X:0.00</span>
                <span class="display" id="cord-y">Y:0.00</span>
                <span class="display" id="cord-z">Z:0.00</span>
            </div>
        </div>
        
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="camera-control.js"></script>
    <script src="position-tool.js"></script>
    <script src="satellites.js"></script>
    <script src="app.js"></script>
</body>
</html>
